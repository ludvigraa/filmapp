{% extends "base.html" %}

{% block content %}
<h1>{{ watchlist.name }}</h1>

<p>
    <a href="{{ url_for('profile') }}">Back to profile</a>
</p>

{% if movies %}
    <ul>
        {% for movie in movies %}
            <li>
                <a href="{{ url_for('movie_detail', movie_id=movie.movie_id) }}">
                    {{ movie.title }}{% if movie.year %} ({{ movie.year }}){% endif %}
                </a>

                <form method="post" action="{{ url_for('remove_from_watchlist', watchlist_id=watchlist.watchlist_id, movie_id=movie.movie_id) }}" style="display:inline;">
                    <button type="submit">Remove</button>
                </form>
            </li>
        {% endfor %}
    </ul>
{% else %}
    <p>This watchlist is empty.</p>
{% endif %}
{% endblock %}
